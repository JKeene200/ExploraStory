{% load static %}
<li route-id="{{route.route_id}}" id="route-data" draggable="true" route-visible="{{route.route_visible}}">
    <div id="route-grip">
        <p>|||</p>
    </div>
    <div id="route-color-display" style="color: {{route.route_color}}; background-color: {{route.route_color}}">
        <p >---</p>
    </div>
    <div id="route-text">
        <div id="route-name">
            <p>{{route.route_name}}</p>
        </div>
        <div id="route-date">
            <p>{{route.route_date}}</p>
        </div>
        <div id="route-item-menu">
            <button id="{{route.route_id}}" class="route-details">Details</button>
            <button id="{{route.route_id}}" class="opacity-toggle">{% if route.route_visible %}Hide{% else %}Show{%endif%}</button>
        </div>
        
    </div>
</li>
